<head>

<title>Awesome Personalized Alignment — Paper Collection</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {

  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-bg-secondary: #252523;
      --color-text-primary: #f0ede8;
      --color-text-secondary: #9e9d99;
      --color-text-tertiary: #6b6a65;
      --color-border: rgba(255,255,255,0.1);
      --color-border-hover: rgba(255,255,255,0.2);
    }

  body {
    font-family: var(--font-sans);
    background: var(--color-bg);
    color: var(--color-text-primary);

  .page { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .header { padding-bottom: 1.5rem; border-bottom: 0.5px solid var(--color-border); margin-bottom: 1.5rem; }

  .stats { display: flex; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }

  .stat-num { font-size: 20px; font-weight: 500; }
  .stat-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }

  .search-wrap input {

  .tag-filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag-btn {
    font-size: 12px; font-family: var(--font-sans); padding: 5px 12px; border-radius: 999px;
    border: 0.5px solid var(--color-border-hover); background: transparent;
    color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s;
  }
  .tag-btn:hover { background: var(--color-bg-secondary); }
  .tag-btn.active { background: #3C3489; border-color: #3C3489; color: #EEEDFE; }

  .count-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; }

  .section-divider {
    font-size: 12px; font-weight: 500; color: var(--color-text-secondary);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 12px 0 6px; border-bottom: 0.5px solid var(--color-border);
    margin-bottom: 8px; margin-top: 4px;
  }

  .papers-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
  .paper-card {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--color-bg); border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg); padding: 14px 16px;
    text-decoration: none; color: inherit; transition: border-color 0.15s, background 0.15s;
  }
  .paper-card:hover { border-color: var(--color-border-hover); background: var(--color-bg-secondary); }
  .paper-left { flex: 1; min-width: 0; }
  .paper-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); line-height: 1.5; margin-bottom: 8px; }
  .paper-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .year-badge { font-size: 11px; padding: 3px 8px; border-radius: 999px; font-weight: 500; }

  .y2025 { background: #E1F5EE; color: #0F6E56; }
  .y2024 { background: #E6F1FB; color: #185FA5; }
  .y2023 { background: #FAEEDA; color: #854F0B; }

    .y2024 { background: #042C53; color: #B5D4F4; }

  .paper-tag { font-size: 11px; padding: 3px 8px; border-radius: 999px; background: var(--color-bg-secondary); color: var(--color-text-secondary); }
  .paper-arrow { font-size: 14px; color: var(--color-text-tertiary); flex-shrink: 0; margin-top: 3px; }
  .no-results { text-align: center; padding: 3rem 0; color: var(--color-text-secondary); font-size: 14px; }
</style>

  { title: "Toward Multi-Session Personalized Conversation: A Large-Scale Dataset and Hierarchical Tree Framework for Implicit Reasoning", year: 2025, url: "https://arxiv.org/abs/2503.07018", tags: ["Memory"] },

  { title: "AI PERSONA: Towards Life-long Personalization of LLMs", year: 2024, url: "https://arxiv.org/abs/2412.13103", tags: ["Memory"] },
  { title: "BAPO: Base-Anchored Preference Optimization for Overcoming Forgetting in Large Language Models Personalization", year: 2024, url: "https://aclanthology.org/2024.findings-emnlp.398.pdf", tags: [] },
  { title: "The PRISM Alignment Dataset: What Participatory, Representative and Individualised Human Feedback Reveals About the Subjective and Multicultural Alignment of Large Language Models", year: 2024, url: "https://openreview.net/forum?id=DFr5hteojx", tags: ["Benchmark"] },
  { title: "Large Language Models Empowered Personalized Web Agents", year: 2024, url: "https://arxiv.org/abs/2410.17236", tags: [] },

const DEFINED_TAGS = ["Survey", "Benchmark", "Reward Model", "Memory", "Multimodal", "Safety"];
let activeTag = null;

const tagFilters = document.getElementById('tag-filters');
DEFINED_TAGS.forEach(tag => {
  const btn = document.createElement('button');
  btn.className = 'tag-btn';
  btn.textContent = tag;
  btn.onclick = () => {
    activeTag = activeTag === tag ? null : tag;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    if (activeTag) btn.classList.add('active');
    filterPapers();
  };
  tagFilters.appendChild(btn);
});

document.getElementById('total-count').textContent = papers.length;

function yearClass(y) {
  if (y >= 2026) return 'y2026';
  if (y === 2025) return 'y2025';
  if (y === 2024) return 'y2024';
  return 'y2023';
}

function filterPapers() {
  const query = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('papers-grid');
  grid.innerHTML = '';

  const filtered = papers.filter(p => {
    const matchSearch = !query || p.title.toLowerCase().includes(query);
    const matchTag = !activeTag || p.tags.includes(activeTag);
    return matchSearch && matchTag;
  });

  document.getElementById('count-label').textContent =
    `Showing ${filtered.length} of ${papers.length} papers`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No papers match your search.</div>';
    return;
  }

  const byYear = {};
  filtered.forEach(p => {
    if (!byYear[p.year]) byYear[p.year] = [];
    byYear[p.year].push(p);
  });

  Object.keys(byYear).sort((a, b) => b - a).forEach(year => {
    const divider = document.createElement('div');
    divider.className = 'section-divider';
    divider.textContent = year;
    grid.appendChild(divider);

    byYear[year].forEach(p => {
      const card = document.createElement('a');
      card.className = 'paper-card';
      card.href = p.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      const left = document.createElement('div');
      left.className = 'paper-left';

      const title = document.createElement('div');
      title.className = 'paper-title';
      title.textContent = p.title;

      const meta = document.createElement('div');
      meta.className = 'paper-meta';

      const yb = document.createElement('span');
      yb.className = `year-badge ${yearClass(p.year)}`;
      yb.textContent = p.year;
      meta.appendChild(yb);

      p.tags.forEach(t => {
        const tb = document.createElement('span');
        tb.className = 'paper-tag';
        tb.textContent = t;
        meta.appendChild(tb);
      });

      left.appendChild(title);
      left.appendChild(meta);

      const arrow = document.createElement('div');
      arrow.className = 'paper-arrow';
      arrow.textContent = '↗';

      card.appendChild(left);
      card.appendChild(arrow);
      grid.appendChild(card);
    });
  });
}

filterPapers();
</script>
</body>
</html>
